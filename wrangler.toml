name            = "hellobmg-api"
main            = "src/index.ts"
compatibility_date = "2026-06-27"

# ── KV: session tokens (24-hour TTL per token) ─────────────────────────────────
[[kv_namespaces]]
binding     = "SESSIONS"
id          = "65fe41fd182c4492b74492a8107f9ce8"

# ── R2: product images ──────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "IMAGES"
bucket_name = "hellobmg-images"

# ── D1: main database ───────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "hellobmg"
database_id   = "7133c4a4-c656-468e-9b2a-6e7f4461551c"
migrations_dir = "migrations"

# ── Public vars (non-secret) ────────────────────────────────────────────────────
# After deploying, set BASE_URL to your actual workers.dev URL:
#   https://hellobmg-api.skreenit.workers.dev
[vars]
BASE_URL = "http://localhost:8787"

# ── Secrets (set via CLI — never put values here) ──────────────────────────────
# wrangler secret put RAZORPAY_KEY_ID
# wrangler secret put RAZORPAY_KEY_SECRET
